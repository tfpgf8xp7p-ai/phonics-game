<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A-F 听音选图 · 有道发音版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', cursive, sans-serif;
    background: linear-gradient(135deg, #FFFDF7 0%, #FADBD8 50%, #D6EAF8 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
    touch-action: manipulation;
  }
  .game-box {
    background: #FFFDF7;
    border-radius: 32px;
    padding: 20px 16px 24px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.10);
    border: 3px solid #FADBD8;
    text-align: center;
  }
  h1 { color: #5D4037; font-size: 1.5em; margin-bottom: 2px; }
  .subtitle { color: #95A5A6; font-size: 0.85em; margin-bottom: 12px; }

  .score-area {
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 0.95em;
    color: #4E342E;
    margin-bottom: 8px;
  }
  .score-area span { font-weight: bold; }

  .progress-bar {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #E8E8E8;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .dot.done { background: #D5F5E3; }
  .dot.wrong-dot { background: #FADBD8; }
  .dot.current { background: #FCF3CF; transform: scale(1.2); border: 2px solid #F5B041; }

  .listen-btn {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #F5B041, #EC7063);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 2.6em;
    cursor: pointer;
    margin: 6px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(245,176,65,0.35);
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .listen-btn:active { transform: scale(0.92); }
  .listen-btn.playing { animation: pulse 0.6s infinite; }
  .listen-btn.loading { opacity: 0.7; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(245,176,65,0.5); }
    50% { box-shadow: 0 0 0 18px rgba(245,176,65,0); }
  }

  .word-display {
    font-size: 1.3em;
    color: #5D4037;
    font-weight: bold;
    min-height: 44px;
    margin: 6px 0 10px;
    letter-spacing: 1px;
  }

  .options {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  .option-btn {
    width: 100px; height: 100px;
    border-radius: 24px;
    border: 4px solid #E8E8E8;
    background: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    touch-action: manipulation;
    -webkit-touch-callout: none;
    user-select: none;
  }
  .option-btn:active:not(:disabled) { transform: scale(0.94); }
  .option-btn .emoji { font-size: 2.6em; }
  .option-btn .label { font-size: 0.8em; color: #4E342E; margin-top: 4px; }
  .option-btn.correct { border-color: #27ae60; background: #D5F5E3; }
  .option-btn.wrong { border-color: #e74c3c; background: #FADBD8; }
  .option-btn.correct::after, .option-btn.wrong::after {
    position: absolute;
    top: -8px; right: -8px;
    font-size: 1.2em;
  }
  .option-btn.correct::after { content: "✅"; }
  .option-btn.wrong::after { content: "❌"; }
  .option-btn:disabled { cursor: default; opacity: 0.7; transform: none !important; }

  .feedback {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 1em;
    font-weight: bold;
    margin: 6px 0;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #D5F5E3; color: #27AE60; }
  .feedback.oop { background: #FADBD8; color: #E74C3C; }

  .next-btn {
    padding: 10px 28px;
    font-size: 1em;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #D6EAF8, #85C1E9);
    color: #5D4037;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: none;
    margin: 6px auto;
    touch-action: manipulation;
  }
  .next-btn:active { transform: scale(0.95); }

  .result-screen { padding: 16px 10px; display: none; }
  .result-screen .big-emoji { font-size: 3.6em; }
  .result-screen h2 { color: #5D4037; font-size: 1.4em; margin: 8px 0; }
  .stars { font-size: 1.8em; margin: 6px 0; }

  .restart-btn {
    padding: 10px 26px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #F5B041, #EC7063);
    color: white;
    font-size: 1em;
    cursor: pointer;
    font-family: inherit;
    margin-top: 10px;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .restart-btn:active { transform: scale(0.95); }

  .status-bar {
    font-size: 0.75em;
    color: #888;
    margin-top: 8px;
    padding: 4px;
    background: #f5f5f5;
    border-radius: 12px;
    min-height: 28px;
  }

  @media (max-width: 480px) {
    .game-box { padding: 14px 10px 18px; border-radius: 24px; }
    h1 { font-size: 1.2em; }
    .option-btn { width: 80px; height: 80px; border-radius: 18px; }
    .option-btn .emoji { font-size: 2.2em; }
    .listen-btn { width: 68px; height: 68px; font-size: 2.2em; }
    .word-display { font-size: 1.1em; min-height: 38px; }
    .score-area { gap: 14px; font-size: 0.8em; }
    .dot { width: 12px; height: 12px; }
    .feedback { font-size: 0.85em; padding: 8px 12px; }
  }
  @media (max-width: 380px) {
    .option-btn { width: 66px; height: 66px; }
    .option-btn .emoji { font-size: 1.8em; }
    .options { gap: 8px; }
  }
</style>
</head>
<body>

<div class="game-box" id="gameArea">
  <h1>🎧 听音选图</h1>
  <p class="subtitle">👂 点喇叭 → 听发音 → 选图片</p>

  <div class="score-area">
    <span>⭐ <span id="correctCount">0</span></span>
    <span>📊 <span id="questionNum">1</span>/<span id="totalQ">12</span></span>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <button class="listen-btn" id="listenBtn">🔊</button>
  <div class="word-display" id="wordDisplay">👆 点🔊听发音</div>

  <div class="options" id="optionsContainer"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">➡️ 下一题</button>

  <div class="result-screen" id="resultScreen">
    <div class="big-emoji" id="resultEmoji">🏆</div>
    <h2 id="resultTitle">Great Job!</h2>
    <div class="stars" id="resultStars">⭐⭐⭐</div>
    <p style="color:#4E342E;font-size:1em;" id="resultText">You got 0 out of 12 correct!</p>
    <button class="restart-btn" onclick="startGame()">🔄 再来一次</button>
  </div>

  <div class="status-bar" id="statusBar">🔊 点击喇叭，有道发音</div>
</div>

<script>
// ============================================================
//  题库（12个单词）
// ============================================================
const questions = [
  { word: "apple", emojis: ["🍎","🍊","🍋"], labels: ["apple","orange","lemon"], correct: 0, hint: "/ˈæpəl/" },
  { word: "bear", emojis: ["🐱","🐻","🐶"], labels: ["cat","bear","dog"], correct: 1, hint: "/ber/" },
  { word: "carrot", emojis: ["🥕","🌽","🍅"], labels: ["carrot","corn","tomato"], correct: 0, hint: "/ˈkærət/" },
  { word: "dog", emojis: ["🐱","🐰","🐶"], labels: ["cat","rabbit","dog"], correct: 2, hint: "/dɔːɡ/" },
  { word: "egg", emojis: ["🥚","🧀","🍞"], labels: ["egg","cheese","bread"], correct: 0, hint: "/eɡ/" },
  { word: "fish", emojis: ["🐟","🐸","🐴"], labels: ["fish","frog","horse"], correct: 0, hint: "/fɪʃ/" },
  { word: "monkeys", emojis: ["🐵","🦍","🐒"], labels: ["monkeys","gorilla","monkey"], correct: 0, hint: "/ˈmʌŋkiz/" },
  { word: "elephants", emojis: ["🐘","🦏","🦛"], labels: ["elephants","rhino","hippo"], correct: 0, hint: "/ˈelɪfənts/" },
  { word: "giraffes", emojis: ["🦒","🐫","🦓"], labels: ["giraffes","camel","zebra"], correct: 0, hint: "/dʒəˈræfs/" },
  { word: "lions", emojis: ["🦁","🐯","🐆"], labels: ["lions","tiger","leopard"], correct: 0, hint: "/ˈlaɪənz/" },
  { word: "tigers", emojis: ["🐯","🦁","🐱"], labels: ["tigers","lion","cat"], correct: 0, hint: "/ˈtaɪɡərz/" },
  { word: "dinosaurs", emojis: ["🦕","🐊","🦎"], labels: ["dinosaurs","crocodile","lizard"], correct: 0, hint: "/ˈdaɪnəsɔːrz/" }
];

// ============================================================
//  状态变量
// ============================================================
let currentQ = 0, correct = 0, answered = false;
let audioPlayer = null;

// ============================================================
//  有道词典在线发音（美式发音 type=2）
//  英式发音 type=1
// ============================================================
function playYoudaoAudio(word, callback) {
  // 如果已有播放中的音频，停止它
  if (audioPlayer) {
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    audioPlayer = null;
  }

  // 有道发音接口（美式发音 type=2）
  const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;

  audioPlayer = new Audio(audioUrl);

  audioPlayer.onended = function() {
    audioPlayer = null;
    if (callback) callback();
  };

  audioPlayer.onerror = function(e) {
    console.error("有道发音加载失败:", e);
    audioPlayer = null;
    // 尝试英式发音作为降级（type=1）
    const fallbackUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=1`;
    const fallbackAudio = new Audio(fallbackUrl);
    fallbackAudio.onended = function() {
      if (callback) callback();
    };
    fallbackAudio.onerror = function() {
      document.getElementById('statusBar').textContent = '⚠️ 发音加载失败，请检查网络';
      if (callback) callback();
    };
    fallbackAudio.play().catch(err => {
      document.getElementById('statusBar').textContent = '⚠️ 播放被阻止，请点击页面后重试';
      if (callback) callback();
    });
    audioPlayer = fallbackAudio;
    return;
  };

  audioPlayer.play().catch(err => {
    console.warn("播放被阻止:", err);
    audioPlayer = null;
    document.getElementById('statusBar').textContent = '⚠️ 点击页面任意位置激活音频';
    if (callback) callback();
  });
}

// ============================================================
//  页面逻辑
// ============================================================
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  currentQ = 0; correct = 0; answered = false;
  shuffleArray(questions);
  document.getElementById('resultScreen').style.display = 'none';
  document.querySelectorAll('.game-box > :not(.result-screen)').forEach(el => {
    if (el.style) el.style.display = '';
  });
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  answered = false;
  document.getElementById('questionNum').textContent = currentQ + 1;
  document.getElementById('totalQ').textContent = questions.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wordDisplay').textContent = '👆 点🔊听发音';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('listenBtn').disabled = false;
  document.getElementById('listenBtn').classList.remove('playing', 'loading');
  document.getElementById('statusBar').textContent = '🔊 点击喇叭，有道发音';

  // 进度点
  const pb = document.getElementById('progressBar');
  pb.innerHTML = '';
  questions.forEach((_, idx) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (idx === currentQ ? ' current' : '');
    pb.appendChild(dot);
  });

  // 选项
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const indices = [0, 1, 2];
  shuffleArray(indices);
  indices.forEach(idx => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="emoji">${q.emojis[idx]}</div>`;
    btn.dataset.idx = idx;
    btn.onclick = () => checkAnswer(btn, idx);
    container.appendChild(btn);
  });
}

// 播放发音（点击喇叭）
function playSound() {
  const btn = document.getElementById('listenBtn');
  const q = questions[currentQ];
  btn.classList.add('playing', 'loading');
  document.getElementById('wordDisplay').textContent = '🔊 加载中...';
  document.getElementById('statusBar').textContent = '⏳ 正在获取有道发音...';

  playYoudaoAudio(q.word, () => {
    btn.classList.remove('playing', 'loading');
    document.getElementById('statusBar').textContent = '✅ 发音完成';
    if (!answered) {
      document.getElementById('wordDisplay').textContent = '🔊 选一张图片吧！';
    }
  });

  // 安全兜底：若加载慢，5秒后恢复按钮
  setTimeout(() => {
    btn.classList.remove('playing', 'loading');
    if (!answered) {
      document.getElementById('statusBar').textContent = '⏳ 若未听到，请检查网络后重试';
    }
  }, 6000);
}

// 检查答案
function checkAnswer(btn, idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (idx === q.correct) {
    btn.classList.add('correct');
    fb.className = 'feedback good show';
    fb.textContent = '✅ Correct! ' + q.word + '!';
    correct++;
    document.getElementById('correctCount').textContent = correct;
    document.querySelectorAll('.dot')[currentQ].classList.add('done');
    // 播放正确发音（二次确认）
    playYoudaoAudio(q.word);
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    fb.className = 'feedback oop show';
    fb.textContent = '❌ 答案是 ' + q.emojis[q.correct] + ' ' + q.word + '!';
    document.querySelectorAll('.dot')[currentQ].classList.add('wrong-dot');
    // 播放正确答案
    playYoudaoAudio(q.word);
  }

  document.getElementById('wordDisplay').textContent = '✅ ' + q.word + '  ' + q.hint;

  if (currentQ < questions.length - 1) {
    document.getElementById('nextBtn').style.display = 'block';
  } else {
    setTimeout(showResult, 1500);
  }
}

function nextQuestion() {
  currentQ++;
  showQuestion();
}

function showResult() {
  document.querySelectorAll('.game-box > :not(.result-screen)').forEach(el => {
    if (el.style) el.style.display = 'none';
  });
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('correctCount').textContent = correct;

  const pct = correct / questions.length;
  let emoji, title, stars;
  if (pct >= 0.9) {
    emoji = '🏆'; title = 'Amazing! Perfect!'; stars = '⭐⭐⭐';
  } else if (pct >= 0.7) {
    emoji = '🎉'; title = 'Great Job!'; stars = '⭐⭐';
  } else {
    emoji = '💪'; title = 'Keep Practicing!'; stars = '⭐';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultText').textContent = `You got ${correct} out of ${questions.length} correct!`;
}

// 启动游戏
startGame();

// 页面任意点击激活音频上下文（解决 iOS 播放限制）
document.addEventListener('click', function() {
  // 创建一个无声的 AudioContext 来激活音频
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
  } catch(e) {
    // 忽略
  }
}, { once: false, passive: true });
</script>
</body>
</html>
