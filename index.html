<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-F 听音选图大挑战 🎧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
    background: linear-gradient(135deg, #FFFDF7 0%, #FADBD8 50%, #D6EAF8 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .game-box {
    background: #FFFDF7;
    border-radius: 40px;
    padding: 30px;
    max-width: 750px;
    width: 100%;
    box-shadow: 0 15px 50px rgba(0,0,0,0.1);
    border: 3px solid #FADBD8;
    text-align: center;
  }
  h1 {
    color: #5D4037;
    font-size: 2em;
    margin-bottom: 5px;
  }
  .subtitle {
    color: #95A5A6;
    font-size: 1em;
    margin-bottom: 20px;
  }
  .progress-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }
  .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #E8E8E8;
    transition: all 0.3s;
  }
  .dot.done { background: #D5F5E3; }
  .dot.wrong-dot { background: #FADBD8; }
  .dot.current { background: #FCF3CF; transform: scale(1.2); border: 2px solid #F5B041; }

  .listen-btn {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, #F5B041, #EC7063);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 3em;
    cursor: pointer;
    margin: 15px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(245,176,65,0.4);
    transition: all 0.3s;
  }
  .listen-btn:hover { transform: scale(1.1); }
  .listen-btn:active { transform: scale(0.95); }
  .listen-btn.playing { animation: pulse 0.5s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(245,176,65,0.5); }
    50% { box-shadow: 0 0 0 20px rgba(245,176,65,0); }
  }
  .word-display {
    font-size: 2em;
    color: #5D4037;
    font-weight: bold;
    min-height: 60px;
    margin: 10px 0;
    letter-spacing: 3px;
  }
  .options {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 20px 0;
  }
  .option-btn {
    width: 150px; height: 150px;
    border-radius: 25px;
    border: 4px solid #E8E8E8;
    background: white;
    cursor: pointer;
    font-size: 1.1em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
  }
  .option-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  .option-btn .emoji { font-size: 3em; }
  .option-btn .label { font-size: 1em; color: #4E342E; margin-top: 8px; font-family: inherit; }
  .option-btn.correct { border-color: #D5F5E3; background: #D5F5E3; }
  .option-btn.wrong { border-color: #FADBD8; background: #FADBD8; }
  .option-btn.correct::after {
    content: "✅";
    position: absolute;
    top: -10px; right: -10px;
    font-size: 1.5em;
  }
  .option-btn.wrong::after {
    content: "❌";
    position: absolute;
    top: -10px; right: -10px;
    font-size: 1.5em;
  }
  .option-btn:disabled { cursor: default; transform: none; }

  .feedback {
    padding: 15px;
    border-radius: 20px;
    font-size: 1.2em;
    font-weight: bold;
    margin: 10px 0;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #D5F5E3; color: #27AE60; }
  .feedback.oop { background: #FADBD8; color: #E74C3C; }

  .score-area {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 15px 0;
    font-size: 1.1em;
    color: #4E342E;
  }
  .score-area span { font-weight: bold; }

  .next-btn {
    padding: 12px 40px;
    font-size: 1.2em;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #D6EAF8, #85C1E9);
    color: #5D4037;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    display: none;
    margin: 10px auto;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(133,193,233,0.4); }

  .result-screen {
    padding: 30px;
    display: none;
  }
  .result-screen .big-emoji { font-size: 5em; }
  .result-screen h2 { color: #5D4037; font-size: 2em; margin: 15px 0; }
  .stars { font-size: 2.5em; margin: 10px 0; }

  .restart-btn {
    padding: 12px 35px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #F5B041, #EC7063);
    color: white;
    font-size: 1.2em;
    cursor: pointer;
    font-family: inherit;
    margin-top: 15px;
    transition: all 0.3s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(245,176,65,0.4); }

  .corner-deco {
    position: fixed;
    font-size: 1.5em;
    opacity: 0.3;
    pointer-events: none;
  }
  .corner-deco:nth-child(1) { top: 10px; left: 10px; }
  .corner-deco:nth-child(2) { top: 10px; right: 10px; }
  .corner-deco:nth-child(3) { bottom: 10px; left: 10px; }
  .corner-deco:nth-child(4) { bottom: 10px; right: 10px; }
  .corner-deco:nth-child(5) { top: 50%; left: 10px; transform: translateY(-50%); }
  .corner-deco:nth-child(6) { top: 50%; right: 10px; transform: translateY(-50%); }
</style>
</head>
<body>
<div class="corner-deco">⭐</div>
<div class="corner-deco">🌸</div>
<div class="corner-deco">🌈</div>
<div class="corner-deco">⭐</div>
<div class="corner-deco">🌸</div>
<div class="corner-deco">🌈</div>

<div class="game-box" id="gameArea">
  <h1>🎧 听音选图大挑战</h1>
  <p class="subtitle">Listen 👂 → Click the correct picture!</p>

  <div class="score-area">
    <span>⭐ <span id="correctCount">0</span></span>
    <span>📊 <span id="questionNum">1</span>/<span id="totalQ">12</span></span>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <button class="listen-btn" id="listenBtn" onclick="playSound()">🔊</button>
  <div class="word-display" id="wordDisplay">👆 点击🔊听发音</div>

  <div class="options" id="optionsContainer"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">➡️ 下一题</button>

  <div class="result-screen" id="resultScreen">
    <div class="big-emoji" id="resultEmoji">🏆</div>
    <h2 id="resultTitle">Great Job!</h2>
    <div class="stars" id="resultStars">⭐⭐⭐</div>
    <p style="color:#4E342E;font-size:1.2em;" id="resultText">You got 0 out of 12 correct!</p>
    <button class="restart-btn" onclick="startGame()">🔄 再来一次</button>
  </div>
</div>

<script>
const questions = [
  { word: "apple", emojis: ["🍎","🍊","🍋"], labels: ["apple","orange","lemon"], correct: 0, hint: "/ˈæpəl/" },
  { word: "bear", emojis: ["🐱","🐻","🐶"], labels: ["cat","bear","dog"], correct: 1, hint: "/ber/" },
  { word: "carrot", emojis: ["🥕","🌽","🍅"], labels: ["carrot","corn","tomato"], correct: 0, hint: "/ˈkærət/" },
  { word: "dog", emojis: ["🐱","🐰","🐶"], labels: ["cat","rabbit","dog"], correct: 2, hint: "/dɔːɡ/" },
  { word: "egg", emojis: ["🥚","🧀","🍞"], labels: ["egg","cheese","bread"], correct: 0, hint: "/eɡ/" },
  { word: "fish", emojis: ["🐟","🐸","🐴"], labels: ["fish","frog","horse"], correct: 0, hint: "/fɪʃ/" },
  { word: "monkeys", emojis: ["🐵","🦍","🐒"], labels: ["monkeys","gorilla","monkey"], correct: 0, hint: "/ˈmʌŋkiz/" },
  { word: "elephants", emojis: ["🐘","🦏","🦛"], labels: ["elephants","rhino","hippo"], correct: 0, hint: "/ˈelɪfənts/" },
  { word: "giraffes", emojis: ["🦒","🐫","🦓"], labels: ["giraffes","camel","zebra"], correct: 0, hint: "/dʒəˈræfs/" },
  { word: "lions", emojis: ["🦁","🐯","🐆"], labels: ["lions","tiger","leopard"], correct: 0, hint: "/ˈlaɪənz/" },
  { word: "tigers", emojis: ["🐯","🦁","🐱"], labels: ["tigers","lion","cat"], correct: 0, hint: "/ˈtaɪɡərz/" },
  { word: "dinosaurs", emojis: ["🦕","🐊","🦎"], labels: ["dinosaurs","crocodile","lizard"], correct: 0, hint: "/ˈdaɪnəsɔːrz/" }
];

let currentQ = 0;
let correct = 0;
let answered = false;

function shuffleArray(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  currentQ = 0;
  correct = 0;
  answered = false;
  shuffleArray(questions);
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('gameArea').querySelectorAll(':scope > :not(.result-screen)').forEach(el => {
    if (el.style) el.style.display = '';
  });
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  answered = false;
  document.getElementById('questionNum').textContent = currentQ + 1;
  document.getElementById('totalQ').textContent = questions.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wordDisplay').textContent = '👆 点击🔊听发音';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('listenBtn').disabled = false;
  document.getElementById('listenBtn').classList.remove('playing');

  // Build progress dots
  const pb = document.getElementById('progressBar');
  pb.innerHTML = '';
  questions.forEach((_, idx) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (idx === currentQ ? ' current' : '');
    pb.appendChild(dot);
  });

  // Build options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const indices = [0, 1, 2];
  shuffleArray(indices);
  indices.forEach(idx => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="emoji">${q.emojis[idx]}</div>`;
    btn.dataset.idx = idx;
    btn.onclick = () => checkAnswer(btn, idx);
    container.appendChild(btn);
  });

  // Auto-play sound after 0.5s
  setTimeout(() => playSound(), 500);
}

function playSound() {
  const btn = document.getElementById('listenBtn');
  btn.classList.add('playing');
  const q = questions[currentQ];
  // Use Speech Synthesis
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(q.word);
    utterance.lang = 'en-US';
    utterance.rate = 0.7;
    utterance.pitch = 1.2;
    utterance.onend = () => {
      btn.classList.remove('playing');
    };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  } else {
    btn.classList.remove('playing');
  }
  document.getElementById('wordDisplay').textContent = '🔊 仔细听！哪个图片正确？';
  // If not answered after a while, remind again
  setTimeout(() => {
    if (!answered) {
      document.getElementById('wordDisplay').textContent = '🔊 再听一次，点击喇叭🔊';
    }
  }, 3000);
}

function checkAnswer(btn, idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (idx === q.correct) {
    btn.classList.add('correct');
    fb.className = 'feedback good show';
    fb.textContent = '✅ Correct! ' + q.word + '!';
    correct++;
    document.getElementById('correctCount').textContent = correct;
    document.querySelectorAll('.dot')[currentQ].classList.add('done');
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    fb.className = 'feedback oop show';
    fb.textContent = '❌ Oops! The answer is ' + q.emojis[q.correct] + ' ' + q.word + '!';
    document.querySelectorAll('.dot')[currentQ].classList.add('wrong-dot');
  }

  document.getElementById('wordDisplay').textContent = '✅ ' + q.word + '  ' + q.hint;

  if (currentQ < questions.length - 1) {
    document.getElementById('nextBtn').style.display = 'block';
  } else {
    setTimeout(showResult, 1500);
  }
}

function nextQuestion() {
  currentQ++;
  showQuestion();
}

function showResult() {
  document.querySelectorAll('.game-box > :not(.result-screen)').forEach(el => {
    if (el.style) el.style.display = 'none';
  });
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('correctCount').textContent = correct;

  const pct = correct / questions.length;
  let emoji, title, stars;
  if (pct >= 0.9) {
    emoji = '🏆'; title = 'Amazing! Perfect!'; stars = '⭐⭐⭐';
  } else if (pct >= 0.7) {
    emoji = '🎉'; title = 'Great Job!'; stars = '⭐⭐';
  } else {
    emoji = '💪'; title = 'Keep Practicing!'; stars = '⭐';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultText').textContent = `You got ${correct} out of ${questions.length} correct!`;
}

startGame();
</script>
</body>
</html>
